name: Deploy Hugo site to Pages

env:
  WC_HUGO_VERSION: '0.136.5'

on:
  # Triggered by pushes to the 'main' branch
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Extract Google Scholar Data, Write to JSON, and Push JSON"]
    types:
      - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    
    outputs:
      should_build: ${{ steps.decision.outputs.build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod
       
       # Detect JSON change (only relevant for workflow_run)
      - name: Check if JSON file changed
        id: json_check
        run: |
          if git diff --quiet HEAD^ HEAD -- data/json/googlescholar_output.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Decide build behavior
      - name: Decide whether to build
        id: decision
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            echo "build=true" >> $GITHUB_OUTPUT

          elif [ "$EVENT" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "build=false" >> $GITHUB_OUTPUT
            elif [ "${{ steps.json_check.outputs.changed }}" = "true" ]; then
              echo "build=true" >> $GITHUB_OUTPUT
            else
              echo "build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "build=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Hugo
        if: steps.decision.outputs.build == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.WC_HUGO_VERSION }}
          extended: true

      - name: Cache Hugo resources
        if: steps.decision.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-
 
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        if: steps.decision.outputs.build == 'true'
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        if: steps.decision.outputs.build == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  # Deployment job
  deploy:
    needs: build
    if: needs.build.outputs.should_build == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
