name: Extract Google Scholar Data, Write to JSON, and Push JSON

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "extract-google-scholar-data"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-search-results

    - name: Run script using serpapi secret to generate JSON
      run: python .github/workflows/fetch_scholar.py
      env:
        SERP_API_KEY: ${{ secrets.SERP_API_KEY }}

    - name: Verify JSON file creation
      run: |
        test -f data/json/googlescholar_output.json
        ls -l data/json
        cat data/json/googlescholar_output.json

    - name: Check if JSON file has changed
      id: check_changes
      run: |
        if git diff --quiet HEAD -- data/json/googlescholar_output.json; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Commit and push JSON file
      if: steps.check_changes.outputs.changed == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add data/json/googlescholar_output.json
        git commit -m 'Update generated JSON file' || exit 0
        git push origin main
